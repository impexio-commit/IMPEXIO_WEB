<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMPEXIO — Customer Users</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-styles.css"/>
</head>
<body>
<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="admin-sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo">🚢</div>
    <div>
      <div class="sidebar-brand-name">IMPEXIO</div>
      <div class="sidebar-brand-sub">Admin Panel</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="admin-dashboard.html"><span class="nav-item-icon">📊</span> Dashboard</a>
    <div class="nav-section-label">Management</div>
    <a class="nav-item active" href="admin-customers.html"><span class="nav-item-icon">🏢</span> Customers</a>
    <a class="nav-item" href="admin-plans.html"><span class="nav-item-icon">📋</span> Plans</a>
    <a class="nav-item" href="admin-subscriptions.html"><span class="nav-item-icon">📅</span> Subscriptions</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAv">O</div>
      <div>
        <div class="sidebar-uname" id="sidebarName">Owner</div>
        <div class="sidebar-role">👑 Owner</div>
      </div>
    </div>
    <button class="btn-sidebar-logout" onclick="doLogout()">⏻ Logout</button>
  </div>
</div>

<div class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-title" id="pageTitle">Customer Users</div>
    <div class="topbar-right">
      <button class="btn-primary" onclick="window.location.href='admin-customers.html'">← Back to Customers</button>
      <button class="btn-primary btn-gold" onclick="openModal()">＋ Add User</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- Customer Info Strip -->
    <div style="background:var(--navy);border-radius:var(--radius-lg);padding:1rem 1.35rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;" id="custInfoStrip">
      <div>
        <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);">Company</div>
        <div style="font-size:1rem;font-weight:700;color:#fff;" id="stripCompany">—</div>
      </div>
      <div style="width:1px;height:36px;background:rgba(255,255,255,0.1);"></div>
      <div>
        <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);">Client Code</div>
        <div style="font-size:1rem;font-weight:700;color:var(--gold-light);font-family:'JetBrains Mono',monospace;" id="stripCode">—</div>
      </div>
      <div style="width:1px;height:36px;background:rgba(255,255,255,0.1);"></div>
      <div>
        <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:rgba(255,255,255,0.4);">Total Users</div>
        <div style="font-size:1rem;font-weight:700;color:#fff;" id="stripCount">0</div>
      </div>
    </div>

    <!-- Users Table -->
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title">User Accounts</div>
        <div class="table-search">
          <span>🔍</span>
          <input type="text" id="searchInput" placeholder="Search users..." oninput="filterTable()"/>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Full Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Client Code</th>
              <th>Created</th>
              <th>Last Login</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">👤</div><div class="empty-state-txt">Loading...</div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Add User</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Client Code display (auto filled, read only) -->
      <div class="mf" style="background:rgba(15,37,64,0.05);border-radius:10px;padding:0.75rem 1rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;">
        <div>
          <div style="font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-soft);">Client Code (Auto Assigned)</div>
          <div style="font-size:1.1rem;font-weight:700;color:var(--navy);font-family:monospace;margin-top:0.2rem;" id="modalClientCode">—</div>
        </div>
        <div style="font-size:1.5rem;">🔑</div>
      </div>

      <div class="mf-grid-2">
        <div class="mf">
          <label class="ml">Full Name <span style="color:red">*</span></label>
          <input type="text" class="mi" id="f_fullname" placeholder="User's full name"/>
        </div>
        <div class="mf">
          <label class="ml">Email <span style="color:red">*</span></label>
          <input type="email" class="mi" id="f_email" placeholder="user@company.com"/>
        </div>
        <div class="mf">
          <label class="ml">Phone</label>
          <input type="text" class="mi" id="f_phone" placeholder="+91 98765 43210"/>
        </div>
        <div class="mf">
          <label class="ml">Password <span style="color:red">*</span></label>
          <input type="password" class="mi" id="f_password" placeholder="Min 8 characters"/>
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" style="background:var(--ivory2);color:var(--text-mid);border:1px solid var(--border);" onclick="closeModal()">Cancel</button>
      <button class="btn-primary" onclick="saveUser()">💾 Create User</button>
    </div>
  </div>
</div>

<div id="adminToast"></div>

<script>
const API_BASE = 'http://localhost:5135/api';
let allUsers  = [];
let customerId = null;
let clientCode = '';
let companyName = '';

function getSess(){ try{return JSON.parse(localStorage.getItem('impexio_admin')||'null');}catch{return null;} }
function getToken(){ return getSess()?.token||''; }
function authHeaders(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }
function doLogout(){ localStorage.removeItem('impexio_admin'); window.location.href='admin-login.html'; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

const sess = getSess();
if(!sess||sess.role!=='Owner') window.location.href='admin-login.html';
else {
  document.getElementById('sidebarName').textContent = sess.fullName||'Owner';
  document.getElementById('sidebarAv').textContent   = (sess.fullName||'O')[0].toUpperCase();
}

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
  catch{ return d; }
}

function showToast(icon,msg){
  const t=document.getElementById('adminToast');
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  t.style.opacity='1'; clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.opacity='0',3000);
}

// Get params from URL
const params = new URLSearchParams(window.location.search);
customerId   = params.get('cid');
companyName  = decodeURIComponent(params.get('cname') || '');
clientCode   = params.get('code') || '';

if(!customerId){ window.location.href='admin-customers.html'; }

// Set header info
document.getElementById('pageTitle').textContent  = `Users — ${companyName}`;
document.getElementById('stripCompany').textContent = companyName;
document.getElementById('stripCode').textContent    = clientCode;
document.getElementById('modalClientCode').textContent = clientCode;

async function loadUsers(){
  try {
    const res  = await fetch(`${API_BASE}/admin/customers/${customerId}/users`, { headers: authHeaders() });
    const json = await res.json();
    allUsers   = json.data || [];
    document.getElementById('stripCount').textContent = allUsers.length;
    renderTable(allUsers);
  } catch(err){ console.error(err); showToast('❌','Failed to load users.'); }
}

function renderTable(data){
  const tbody = document.getElementById('usersBody');
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="8"><div class="empty-state"><div class="empty-state-icon">👤</div><div class="empty-state-txt">No users yet</div><div class="empty-state-sub">Click + Add User to create the first user</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(u=>`
    <tr>
      <td><strong>${u.fullName}</strong></td>
      <td style="font-size:0.78rem;">${u.email}</td>
      <td>${u.phone||'—'}</td>
      <td><span style="font-family:monospace;font-size:0.75rem;font-weight:700;color:var(--navy-light);">${u.clientCode||clientCode}</span></td>
      <td>${fmtDate(u.createdAt)}</td>
      <td>${u.lastLogin?fmtDate(u.lastLogin):'<span style="color:var(--text-soft);font-size:0.75rem;">Never</span>'}</td>
      <td>${u.isActive?'<span class="badge badge-green">✅ Active</span>':'<span class="badge badge-red">❌ Inactive</span>'}</td>
      <td>
        <button class="btn-act ${u.isActive?'btn-act-toggle-on':'btn-act-toggle-off'}"
          onclick="toggleUser(${u.id},${u.isActive})">
          ${u.isActive?'🔴 Deactivate':'🟢 Activate'}
        </button>
      </td>
    </tr>`).join('');
}

function filterTable(){
  const q = document.getElementById('searchInput').value.toLowerCase();
  if(!q){ renderTable(allUsers); return; }
  renderTable(allUsers.filter(u=>
    u.fullName?.toLowerCase().includes(q)||
    u.email?.toLowerCase().includes(q)||
    u.phone?.toLowerCase().includes(q)
  ));
}

function openModal(){
  document.getElementById('f_fullname').value = '';
  document.getElementById('f_email').value    = '';
  document.getElementById('f_phone').value    = '';
  document.getElementById('f_password').value = '';
  document.getElementById('userModal').classList.add('open');
}
function closeModal(){ document.getElementById('userModal').classList.remove('open'); }

async function saveUser(){
  const fullName = document.getElementById('f_fullname').value.trim();
  const email    = document.getElementById('f_email').value.trim();
  const password = document.getElementById('f_password').value;

  if(!fullName){ showToast('⚠️','Please enter full name.'); return; }
  if(!email)   { showToast('⚠️','Please enter email.'); return; }
  if(!password){ showToast('⚠️','Please enter password.'); return; }
  if(password.length < 8){ showToast('⚠️','Password must be at least 8 characters.'); return; }

  try {
    const res  = await fetch(`${API_BASE}/admin/customers/${customerId}/users`, {
      method:  'POST',
      headers: authHeaders(),
      body:    JSON.stringify({
        customerId: parseInt(customerId),
        fullName, email,
        phone:    document.getElementById('f_phone').value.trim(),
        password
      })
    });
    const json = await res.json();
    if(json.success){
      showToast('✅',`User ${fullName} created! Client Code: ${clientCode}`);
      closeModal(); loadUsers();
    } else {
      showToast('❌', json.message||'Failed.');
    }
  } catch(err){ showToast('❌','Error: '+err.message); }
}

async function toggleUser(id, isActive){
  if(!confirm(isActive?'Deactivate this user?':'Activate this user?')) return;
  try {
    const res  = await fetch(`${API_BASE}/admin/customers/users/${id}/toggle`, {
      method:  'PUT',
      headers: authHeaders(),
      body:    JSON.stringify({ isActive: !isActive })
    });
    const json = await res.json();
    if(json.success){
      showToast(isActive?'🔴':'🟢', isActive?'User deactivated.':'User activated.');
      loadUsers();
    } else {
      showToast('❌', json.message||'Failed.');
    }
  } catch(err){ showToast('❌', err.message); }
}

loadUsers();
</script>
</body>
</html>
