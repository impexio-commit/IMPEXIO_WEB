<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMPEXIO — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:      #0f2540;
      --navy-mid:  #1a3a5c;
      --gold:      #c9a84c;
      --gold-light:#e2c06e;
      --ivory:     #fafaf7;
      --ivory2:    #f4f3ee;
      --text:      #1a2332;
      --text-mid:  #3d5475;
      --text-soft: #6b7fa3;
      --border:    #dde3f0;
      --white:     #ffffff;
      --red:       #dc2626;
      --green:     #16a34a;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--navy);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Background decoration */
    body::before {
      content: '';
      position: absolute;
      top: -200px; right: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 65%);
      border-radius: 50%;
      filter: blur(60px);
    }
    body::after {
      content: '';
      position: absolute;
      bottom: -150px; left: -150px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(26,58,92,0.8) 0%, transparent 65%);
      border-radius: 50%;
      filter: blur(40px);
    }

    /* Floating dots */
    .bg-dots {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    .login-wrap {
      position: relative; z-index: 10;
      width: 100%; max-width: 460px;
      padding: 1rem;
      animation: fadeUp 0.6s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Brand */
    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-logo {
      width: 56px; height: 56px;
      background: var(--gold);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
      margin: 0 auto 1rem;
      box-shadow: 0 8px 32px rgba(201,168,76,0.3);
    }
    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem; font-weight: 700;
      color: #fff; letter-spacing: 0.08em;
    }
    .brand-sub {
      font-size: 0.75rem; color: rgba(255,255,255,0.45);
      text-transform: uppercase; letter-spacing: 0.15em;
      margin-top: 0.25rem;
    }

    /* Card */
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2.5rem;
      backdrop-filter: blur(20px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.3);
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 600;
      color: #fff; margin-bottom: 0.35rem;
    }
    .card-sub {
      font-size: 0.8rem; color: rgba(255,255,255,0.45);
      margin-bottom: 2rem;
    }

    /* Form */
    .field { margin-bottom: 1.1rem; }
    .field label {
      display: block;
      font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em;
      color: rgba(255,255,255,0.5);
      margin-bottom: 0.45rem;
    }
    .field input {
      width: 100%; padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 10px;
      font-size: 0.92rem; color: #fff;
      font-family: 'Outfit', sans-serif;
      transition: all 0.2s;
      outline: none;
    }
    .field input::placeholder { color: rgba(255,255,255,0.25); }
    .field input:focus {
      border-color: var(--gold);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }

    /* Password wrap */
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 3rem; }
    .pw-toggle {
      position: absolute; right: 0.85rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.35); font-size: 1rem;
      transition: color 0.2s; padding: 0.25rem;
    }
    .pw-toggle:hover { color: rgba(255,255,255,0.7); }

    /* Error */
    .error-msg {
      background: rgba(220,38,38,0.1);
      border: 1px solid rgba(220,38,38,0.3);
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-size: 0.8rem; color: #fca5a5;
      margin-bottom: 1rem;
      display: none;
    }
    .error-msg.show { display: block; }

    /* Submit button */
    .btn-login {
      width: 100%; padding: 0.9rem;
      background: var(--gold);
      color: var(--navy);
      border: none; border-radius: 10px;
      font-size: 0.95rem; font-weight: 700;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.25s;
      box-shadow: 0 6px 24px rgba(201,168,76,0.3);
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-login:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,168,76,0.4);
    }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* Spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(15,37,64,0.3);
      border-top-color: var(--navy);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider */
    .divider {
      display: flex; align-items: center; gap: 0.75rem;
      margin: 1.5rem 0;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: rgba(255,255,255,0.1);
    }
    .divider-txt {
      font-size: 0.72rem; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 0.08em;
    }

    /* Role badges */
    .role-info {
      display: flex; gap: 0.5rem; margin-top: 1.5rem;
      justify-content: center;
    }
    .role-badge {
      display: flex; align-items: center; gap: 0.35rem;
      padding: 0.3rem 0.75rem;
      border-radius: 50px;
      font-size: 0.68rem; font-weight: 600;
      letter-spacing: 0.05em;
    }
    .role-badge.owner {
      background: rgba(201,168,76,0.15);
      border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light);
    }
    .role-badge.customer {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.5);
    }

    /* Footer */
    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.2);
    }

    @media (max-width: 480px) {
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="bg-dots"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand">
      <div class="brand-logo">🚢</div>
      <div class="brand-name">IMPEXIO</div>
      <div class="brand-sub">Trade Document Suite</div>
    </div>

    <!-- Card -->
    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your account to continue</div>

      <div class="error-msg" id="errorMsg">Invalid email or password. Please try again.</div>

      <div class="field">
        <label>Email Address</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email"/>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
          <button class="pw-toggle" onclick="togglePw()" type="button" id="pwToggle">👁</button>
        </div>
      </div>

      <button class="btn-login" id="loginBtn" onclick="doLogin()">
        <div class="spinner"></div>
        <span class="btn-text">Sign In →</span>
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-txt">Access Levels</div>
        <div class="divider-line"></div>
      </div>

      <div class="role-info">
        <div class="role-badge owner">👑 Owner Panel</div>
        <div class="role-badge customer">🏢 Customer Portal</div>
      </div>
    </div>

    <div class="login-footer">
      © 2026 IMPEXIO — Export Import Management System
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:5135/api';

    function togglePw() {
      const inp = document.getElementById('password');
      const btn = document.getElementById('pwToggle');
      if (inp.type === 'password') {
        inp.type = 'text'; btn.textContent = '🙈';
      } else {
        inp.type = 'password'; btn.textContent = '👁';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('loginBtn');
      const errMsg   = document.getElementById('errorMsg');

      errMsg.classList.remove('show');

      if (!email || !password) {
        errMsg.textContent = 'Please enter your email and password.';
        errMsg.classList.add('show');
        return;
      }

      // Loading state
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const res  = await fetch(`${API_BASE}/admin/auth/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        const json = await res.json();

        if (json.success) {
          // Store session
          localStorage.setItem('impexio_admin', JSON.stringify({
            token:       json.data.token,
            fullName:    json.data.fullName,
            email:       json.data.email,
            role:        json.data.role,
            clientCode:  json.data.clientCode,
            companyName: json.data.companyName,
            expiry:      json.data.expiry
          }));

          // Redirect based on role
          if (json.data.role === 'Owner') {
            window.location.href = 'admin-dashboard.html';
          } else if (json.data.role === 'Customer') {
            window.location.href = '../main.html';
          }
        } else {
          errMsg.textContent = json.message || 'Invalid credentials.';
          errMsg.classList.add('show');
        }
      } catch (err) {
        errMsg.textContent = 'Cannot connect to server. Please try again.';
        errMsg.classList.add('show');
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Check if already logged in
    const existing = localStorage.getItem('impexio_admin');
    if (existing) {
      try {
        const sess = JSON.parse(existing);
        if (sess.role === 'Owner') window.location.href = 'admin-dashboard.html';
        else if (sess.role === 'Customer') window.location.href = '../main.html';
      } catch(e) {}
    }
  </script>
</body>
</html>
