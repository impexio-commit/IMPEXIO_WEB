<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IMPEXIO — Subscriptions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="admin-styles.css"/>
</head>
<body>
<button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>

<div class="admin-sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="sidebar-logo">🚢</div>
    <div>
      <div class="sidebar-brand-name">IMPEXIO</div>
      <div class="sidebar-brand-sub">Admin Panel</div>
    </div>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section-label">Main</div>
    <a class="nav-item" href="admin-dashboard.html"><span class="nav-item-icon">📊</span> Dashboard</a>
    <div class="nav-section-label">Management</div>
    <a class="nav-item" href="admin-customers.html"><span class="nav-item-icon">🏢</span> Customers</a>
    <a class="nav-item" href="admin-plans.html"><span class="nav-item-icon">📋</span> Plans</a>
    <a class="nav-item active" href="admin-subscriptions.html"><span class="nav-item-icon">📅</span> Subscriptions</a>
  </nav>
  <div class="sidebar-footer">
    <div class="sidebar-user">
      <div class="sidebar-avatar" id="sidebarAv">O</div>
      <div>
        <div class="sidebar-uname" id="sidebarName">Owner</div>
        <div class="sidebar-role">👑 Owner</div>
      </div>
    </div>
    <button class="btn-sidebar-logout" onclick="doLogout()">⏻ Logout</button>
  </div>
</div>

<div class="admin-main">
  <div class="admin-topbar">
    <div class="topbar-title">Subscription Master</div>
    <div class="topbar-right">
      <button class="btn-primary btn-gold" onclick="openAddModal()">＋ Add Subscription</button>
    </div>
  </div>

  <div class="admin-content">

    <!-- Filter bar -->
    <div style="background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.35rem;margin-bottom:1.25rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
      <div class="table-search" style="flex:1;min-width:200px;">
        <span>🔍</span>
        <input type="text" id="searchInput" placeholder="Search by company or client code..." oninput="filterTable()" style="width:100%;"/>
      </div>
      <select id="filterStatus" class="mi mi-select" style="width:160px;padding:0.4rem 0.75rem;" onchange="filterTable()">
        <option value="">All Status</option>
        <option value="active">Active Only</option>
        <option value="inactive">Inactive Only</option>
        <option value="expired">Expired</option>
      </select>
      <select id="filterPlan" class="mi mi-select" style="width:180px;padding:0.4rem 0.75rem;" onchange="filterTable()">
        <option value="">All Plans</option>
      </select>
    </div>

    <!-- Table -->
    <div class="table-card">
      <div class="table-card-head">
        <div class="table-card-title">All Subscriptions</div>
        <div id="subCount" style="font-size:0.78rem;color:var(--text-soft);"></div>
      </div>
      <div style="overflow-x:auto;">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Customer</th>
              <th>Client Code</th>
              <th>Plan</th>
              <th>Start Date</th>
              <th>End Date</th>
              <th>Days Left</th>
              <th>Payment</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="subsBody">
            <tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-txt">Loading...</div></div></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Add Subscription Modal -->
<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Add Subscription</div>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mf">
        <label class="ml">Customer <span style="color:red">*</span></label>
        <select class="mi mi-select" id="f_customer">
          <option value="">Select customer...</option>
        </select>
      </div>
      <div class="mf">
        <label class="ml">Plan <span style="color:red">*</span></label>
        <select class="mi mi-select" id="f_plan" onchange="autoSetEndDate()">
          <option value="">Select plan...</option>
        </select>
      </div>
      <div class="mf-grid-2">
        <div class="mf">
          <label class="ml">Start Date <span style="color:red">*</span></label>
          <input type="date" class="mi" id="f_startdate" onchange="autoSetEndDate()"/>
        </div>
        <div class="mf">
          <label class="ml">End Date <span style="color:red">*</span></label>
          <input type="date" class="mi" id="f_enddate"/>
        </div>
      </div>
      <div class="mf-grid-2">
        <div class="mf">
          <label class="ml">Payment Status</label>
          <select class="mi mi-select" id="f_payment">
            <option value="Paid">Paid</option>
            <option value="Pending">Pending</option>
            <option value="Partial">Partial</option>
          </select>
        </div>
        <div class="mf">
          <label class="ml">Active</label>
          <select class="mi mi-select" id="f_isactive">
            <option value="true">Yes — Active</option>
            <option value="false">No — Inactive</option>
          </select>
        </div>
      </div>
      <div class="mf">
        <label class="ml">Notes</label>
        <input type="text" class="mi" id="f_notes" placeholder="Optional notes..."/>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn-primary" style="background:var(--ivory2);color:var(--text-mid);border:1px solid var(--border);" onclick="closeAddModal()">Cancel</button>
      <button class="btn-primary" onclick="saveSubscription()">💾 Save Subscription</button>
    </div>
  </div>
</div>

<div id="adminToast"></div>

<script>
const API_BASE = 'http://localhost:5135/api';
let allSubs      = [];
let allCustomers = [];
let allPlans     = [];

function getSess(){ try{return JSON.parse(localStorage.getItem('impexio_admin')||'null');}catch{return null;} }
function getToken(){ return getSess()?.token||''; }
function authHeaders(){ return {'Content-Type':'application/json','Authorization':'Bearer '+getToken()}; }
function doLogout(){ localStorage.removeItem('impexio_admin'); window.location.href='admin-login.html'; }
function toggleSidebar(){ document.getElementById('sidebar').classList.toggle('open'); }

const sess = getSess();
if(!sess||sess.role!=='Owner') window.location.href='admin-login.html';
else {
  document.getElementById('sidebarName').textContent = sess.fullName||'Owner';
  document.getElementById('sidebarAv').textContent   = (sess.fullName||'O')[0].toUpperCase();
}

function showToast(icon,msg){
  const t=document.getElementById('adminToast');
  t.innerHTML=`<span>${icon}</span><span>${msg}</span>`;
  t.style.opacity='1'; clearTimeout(t._t);
  t._t=setTimeout(()=>t.style.opacity='0',3000);
}

function fmtDate(d){
  if(!d) return '—';
  try{ return new Date(d).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}); }
  catch{ return d; }
}

function daysLeft(endDate){
  if(!endDate) return null;
  const diff = Math.ceil((new Date(endDate) - new Date()) / (1000*60*60*24));
  return diff;
}

function daysLeftBadge(days){
  if(days === null) return '—';
  if(days < 0)    return `<span class="badge badge-red">Expired</span>`;
  if(days <= 7)   return `<span class="badge badge-red">⚠️ ${days}d left</span>`;
  if(days <= 30)  return `<span class="badge badge-gold">⏰ ${days}d left</span>`;
  return `<span class="badge badge-green">✅ ${days}d left</span>`;
}

// Load all data
async function loadAll(){
  try {
    // Load customers
    const cRes  = await fetch(`${API_BASE}/admin/customers`, { headers: authHeaders() });
    const cJson = await cRes.json();
    allCustomers = cJson.data || [];

    // Load plans
    const pRes  = await fetch(`${API_BASE}/admin/plans`, { headers: authHeaders() });
    const pJson = await pRes.json();
    allPlans = pJson.data || [];

    // Populate plan filter
    const filterPlan = document.getElementById('filterPlan');
    allPlans.forEach(p => {
      filterPlan.innerHTML += `<option value="${p.id}">${p.planName}</option>`;
    });

    // Load subscriptions for each customer
    allSubs = [];
    for(const c of allCustomers){
      const sRes  = await fetch(`${API_BASE}/admin/customers/${c.id}/subscriptions`, { headers: authHeaders() });
      const sJson = await sRes.json();
      const subs  = sJson.data || [];
      subs.forEach(s => {
        allSubs.push({
          ...s,
          companyName: c.companyName,
          clientCode:  c.clientCode,
          customerId:  c.id
        });
      });
    }

    document.getElementById('subCount').textContent = `${allSubs.length} total subscriptions`;
    renderTable(allSubs);

    // Populate modal selects
    const custSel = document.getElementById('f_customer');
    custSel.innerHTML = '<option value="">Select customer...</option>';
    allCustomers.forEach(c => {
      custSel.innerHTML += `<option value="${c.id}">${c.companyName} (${c.clientCode})</option>`;
    });

    const planSel = document.getElementById('f_plan');
    planSel.innerHTML = '<option value="">Select plan...</option>';
    allPlans.forEach(p => {
      planSel.innerHTML += `<option value="${p.id}" data-months="${p.durationMonths}">${p.planName} — ₹${Number(p.price).toLocaleString('en-IN')}</option>`;
    });

  } catch(err){ console.error(err); showToast('❌','Failed to load data.'); }
}

function renderTable(data){
  const tbody = document.getElementById('subsBody');
  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="9"><div class="empty-state"><div class="empty-state-icon">📅</div><div class="empty-state-txt">No subscriptions found</div><div class="empty-state-sub">Add a subscription to a customer to get started</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = data.map(s => {
    const days   = daysLeft(s.endDate);
    const expired = days !== null && days < 0;
    return `
      <tr>
        <td><strong>${s.companyName||'—'}</strong></td>
        <td><span style="font-family:monospace;font-size:0.75rem;color:var(--navy-light);font-weight:700;">${s.clientCode||'—'}</span></td>
        <td><span class="badge badge-gold">${s.planName||'—'}</span></td>
        <td>${fmtDate(s.startDate)}</td>
        <td>${fmtDate(s.endDate)}</td>
        <td>${daysLeftBadge(days)}</td>
        <td><span class="badge ${s.paymentStatus==='Paid'?'badge-green':s.paymentStatus==='Pending'?'badge-red':'badge-gold'}">${s.paymentStatus}</span></td>
        <td>${s.isActive&&!expired?'<span class="badge badge-green">✅ Active</span>':expired?'<span class="badge badge-red">⌛ Expired</span>':'<span class="badge badge-gray">⏸ Inactive</span>'}</td>
        <td>
          <button class="btn-act ${s.isActive?'btn-act-toggle-on':'btn-act-toggle-off'}" onclick="toggleSub(${s.id},${s.isActive})">${s.isActive?'🔴 Deactivate':'🟢 Activate'}</button>
        </td>
      </tr>`;
  }).join('');
}

function filterTable(){
  const q       = document.getElementById('searchInput').value.toLowerCase();
  const status  = document.getElementById('filterStatus').value;
  const planId  = document.getElementById('filterPlan').value;
  const now     = new Date();

  let filtered = allSubs;

  if(q) filtered = filtered.filter(s =>
    s.companyName?.toLowerCase().includes(q) ||
    s.clientCode?.toLowerCase().includes(q));

  if(status === 'active')   filtered = filtered.filter(s => s.isActive && new Date(s.endDate) >= now);
  if(status === 'inactive') filtered = filtered.filter(s => !s.isActive);
  if(status === 'expired')  filtered = filtered.filter(s => new Date(s.endDate) < now);
  if(planId) filtered = filtered.filter(s => s.planId == planId);

  document.getElementById('subCount').textContent = `${filtered.length} of ${allSubs.length} subscriptions`;
  renderTable(filtered);
}

// Modal
function openAddModal(){
  // Set today as default start date
  document.getElementById('f_startdate').value = new Date().toISOString().split('T')[0];
  document.getElementById('f_enddate').value   = '';
  document.getElementById('f_customer').value  = '';
  document.getElementById('f_plan').value      = '';
  document.getElementById('f_payment').value   = 'Paid';
  document.getElementById('f_isactive').value  = 'true';
  document.getElementById('f_notes').value     = '';

  // Pre-select customer from URL param
  const params = new URLSearchParams(window.location.search);
  const cid    = params.get('cid');
  if(cid) document.getElementById('f_customer').value = cid;

  document.getElementById('addModal').classList.add('open');
}
function closeAddModal(){ document.getElementById('addModal').classList.remove('open'); }

function autoSetEndDate(){
  const startDate = document.getElementById('f_startdate').value;
  const planSel   = document.getElementById('f_plan');
  const selected  = planSel.options[planSel.selectedIndex];
  const months    = parseInt(selected?.dataset?.months || '0');

  if(startDate && months){
    const end = new Date(startDate);
    end.setMonth(end.getMonth() + months);
    document.getElementById('f_enddate').value = end.toISOString().split('T')[0];
  }
}

async function saveSubscription(){
  const custId   = document.getElementById('f_customer').value;
  const planId   = document.getElementById('f_plan').value;
  const startDate= document.getElementById('f_startdate').value;
  const endDate  = document.getElementById('f_enddate').value;

  if(!custId)    { showToast('⚠️','Please select a customer.'); return; }
  if(!planId)    { showToast('⚠️','Please select a plan.'); return; }
  if(!startDate) { showToast('⚠️','Please select a start date.'); return; }
  if(!endDate)   { showToast('⚠️','Please select an end date.'); return; }

  const payload = {
    customerId:    parseInt(custId),
    planId:        parseInt(planId),
    startDate,     endDate,
    isActive:      document.getElementById('f_isactive').value === 'true',
    paymentStatus: document.getElementById('f_payment').value,
    notes:         document.getElementById('f_notes').value.trim()
  };

  try {
    const res  = await fetch(`${API_BASE}/admin/customers/${custId}/subscriptions`, {
      method: 'POST', headers: authHeaders(), body: JSON.stringify(payload)
    });
    const json = await res.json();
    if(json.success){
      showToast('✅','Subscription added!');
      closeAddModal();
      loadAll();
    } else {
      showToast('❌', json.message || 'Failed.');
    }
  } catch(err){ showToast('❌','Error: '+err.message); }
}

async function toggleSub(id, isActive){
  if(!confirm(isActive?'Deactivate this subscription?':'Activate this subscription?')) return;
  try {
    const res  = await fetch(`${API_BASE}/admin/subscriptions/${id}/toggle`, {
      method: 'PUT', headers: authHeaders(),
      body: JSON.stringify({ isActive: !isActive })
    });
    const json = await res.json();
    if(json.success){
      showToast(isActive?'🔴':'🟢', isActive?'Subscription deactivated.':'Subscription activated.');
      loadAll();
    } else {
      showToast('❌', json.message||'Failed.');
    }
  } catch(err){ showToast('❌', err.message); }
}

loadAll();
</script>
</body>
</html>
